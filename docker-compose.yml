name: forge-ingest

services:
  forge-ingest:
    build: .
    container_name: forge-ingest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8092:8092"
    secrets:
      - source: forge_deploy_key
        target: forge_deploy_key
      - source: forge_known_hosts
        target: forge_known_hosts
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8092/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

secrets:
  forge_deploy_key:
    file: ./secrets/forge_deploy_key
  forge_known_hosts:
    file: ./secrets/forge_known_hosts
